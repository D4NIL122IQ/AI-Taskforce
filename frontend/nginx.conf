server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # SPA : renvoie index.html pour toutes les routes sous /AI-Taskforce/
    location /AI-Taskforce/ {
        try_files $uri $uri/ /AI-Taskforce/index.html;
    }

    # Redirection racine → base path
    location = / {
        return 301 /AI-Taskforce/;
    }

    # Proxy API vers le backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        # Streaming NDJSON
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
